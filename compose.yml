version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    image: home-gym-app
    ports:
      - '5011:8000'
    env_file:
      - .env
    environment:
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      - ./database:/var/www/html/database
      - storage:/var/www/html/storage
      - cache:/var/www/html/bootstrap/cache
    command: ["/bin/sh", "-lc", "mkdir -p /var/www/html/database && touch /var/www/html/database/database.sqlite && chmod 666 /var/www/html/database/database.sqlite && chown -R www-data:www-data /var/www/html || true && php artisan serve --host=0.0.0.0 --port=8000"]

volumes:
  storage:
  cache:
